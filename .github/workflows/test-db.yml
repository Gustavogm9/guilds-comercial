name: Test DB (invariants + RLS isolation)

# Toca o banco remoto via Management API. Roda só sob demanda + nightly.
# Requer secrets:
#   SUPABASE_PERSONAL_ACCESS_TOKEN  (sbp_...)
#   SUPABASE_PROJECT_REF             (mdmbuekuemcjumxcmkls)
on:
  workflow_dispatch:
  schedule:
    # 02:00 UTC todos os dias (~23h BRT) — fora do pico
    - cron: "0 2 * * *"

jobs:
  test-db:
    name: DB invariants + RLS isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run DB tests
        env:
          SUPABASE_PERSONAL_ACCESS_TOKEN: ${{ secrets.SUPABASE_PERSONAL_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: npm run test:db
