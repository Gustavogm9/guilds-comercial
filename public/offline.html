<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão — Guilds Comercial</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #0f172a;
      padding: 2rem;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(135deg, #0a1126 0%, #131a35 100%); color: #f1f5f9; }
      .card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.08); }
      p { color: #94a3b8; }
    }
    .card {
      max-width: 420px;
      padding: 2.5rem 2rem;
      border-radius: 1rem;
      background: white;
      box-shadow: 0 4px 30px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.05);
    }
    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.5rem;
      border-radius: 14px;
      background: linear-gradient(135deg, #4c5ee4, #5a6cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 28px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { font-size: 0.9rem; color: #64748b; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: #4c5ee4;
      color: white;
      border: 0;
      padding: 0.6rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    button:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">G</div>
    <h1>Você está offline</h1>
    <p>Não foi possível conectar ao Guilds Comercial. Verifique sua conexão e tente novamente.</p>
    <button onclick="location.reload()">Tentar de novo</button>
  </main>
</body>
</html>
